<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ARRIVIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070f1d;--surf:#0c1a31;--card:#102340;--brd:#183353;
  --blu:#1a6eff;--bld:#1452cc;--amb:#f5a324;--grn:#16c96a;--red:#f04444;
  --tx:#edf4ff;--tx2:#6da1cc;--tx3:#3a6a90;
  --hb:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--fb);-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:var(--fb);transition:opacity .15s,background .15s,border-color .15s}
button:active{opacity:.85}
input,textarea{font-family:var(--fb)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
.kiosk-wrap{min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.kiosk-hdr{background:var(--surf);border-bottom:2px solid var(--brd);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.kiosk-hdr-icon{font-size:26px}
.kiosk-hdr-title{font-family:var(--hb);font-size:15px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx2)}
.kiosk-body{flex:1;padding:24px 20px;overflow-y:auto}
.screen-title{font-family:var(--hb);font-size:30px;font-weight:700;letter-spacing:.5px;text-align:center;color:var(--tx);margin-bottom:24px}
.lang-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;max-width:860px;margin:0 auto}
.btn-lang{background:var(--card);border:2px solid var(--brd);border-radius:12px;padding:18px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--tx);width:100%}
.btn-lang:hover{border-color:var(--blu);background:#16305a}
.btn-lang .flag{font-size:38px;line-height:1}
.btn-lang .lname{font-size:15px;font-weight:700}
.op-list{display:flex;flex-direction:column;gap:12px;max-width:580px;margin:0 auto}
.btn-op{background:var(--card);border:2px solid var(--brd);border-radius:12px;padding:20px 24px;display:flex;align-items:center;gap:18px;color:var(--tx);font-family:var(--hb);font-size:30px;font-weight:700;letter-spacing:.3px;width:100%;text-align:left}
.btn-op:hover{border-color:var(--blu);background:#16305a}
.btn-op .icon{font-size:40px;flex-shrink:0;min-width:50px;text-align:center}
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:8px;max-width:860px;margin:0 auto}
.btn-country{background:var(--card);border:2px solid var(--brd);border-radius:8px;padding:13px 10px;color:var(--tx);font-size:14px;font-weight:600;text-align:center;width:100%}
.btn-country:hover{border-color:var(--blu);background:#16305a}
.form-group{margin-bottom:16px}
.field-label{display:block;font-family:var(--hb);font-size:16px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx2);margin-bottom:7px;font-weight:700}
.field-label.err{color:var(--red)}
.field-input{width:100%;padding:14px 16px;background:var(--card);border:2px solid var(--brd);border-radius:8px;color:var(--tx);font-size:18px;outline:none;-webkit-appearance:none}
.field-input.err{border-color:var(--red)}
.field-input:focus{border-color:var(--blu)}
.field-input::placeholder{color:var(--tx3)}
textarea.field-input{resize:none;min-height:90px}
.field-err{color:var(--red);font-size:12px;margin-top:4px;display:block}
.form-wrap{max-width:580px;margin:0 auto;width:100%}
.form-actions{display:flex;gap:12px;margin-top:20px}
.btn-back{background:transparent;border:1px solid var(--brd);border-radius:8px;padding:12px 20px;color:var(--tx2);font-size:15px;flex-shrink:0}
.btn-back:hover{border-color:var(--tx2)}
.btn-primary{background:var(--blu);border:none;border-radius:8px;padding:14px 32px;color:#fff;font-family:var(--hb);font-size:22px;font-weight:700;letter-spacing:1px;text-transform:uppercase;flex:1}
.btn-primary:hover{background:var(--bld)}
.btn-ghost{background:transparent;border:1px solid var(--brd);border-radius:4px;padding:5px 14px;color:var(--tx3);font-size:11px}
/* admin wrap */
.confirm-center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 100px);text-align:center;padding:20px}
.confirm-bigicon{font-size:80px;margin-bottom:20px}
.confirm-title{font-family:var(--hb);font-size:28px;font-weight:700;color:var(--grn);margin-bottom:16px;max-width:480px}
.confirm-msg{font-size:22px;color:var(--tx2);max-width:560px;line-height:1.65;margin-bottom:32px;font-weight:500}
.confirm-id-box{background:var(--card);border:2px solid var(--blu);border-radius:12px;padding:18px 48px;margin-bottom:32px}
.confirm-id-lbl{font-family:var(--hb);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--tx2);margin-bottom:6px}
.confirm-id-val{font-family:var(--hb);font-size:46px;font-weight:900;letter-spacing:6px;color:var(--tx)}
.btn-newreg{background:var(--card);border:2px solid var(--brd);border-radius:8px;padding:14px 32px;color:var(--tx);font-family:var(--hb);font-size:18px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.btn-newreg:hover{border-color:var(--blu)}
/* MIC inline */
.mic-wrap{display:flex;flex-direction:column;align-items:center;margin-top:18px;padding:0 10px;gap:0}
.mic-wrap.rtl{direction:rtl}
.mic-btn-pill{display:inline-flex;align-items:center;gap:10px;padding:13px 28px;border-radius:50px;border:2px solid rgba(255,255,255,.18);font-family:var(--hb);font-size:17px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#fff;cursor:pointer;transition:all .2s}
.mic-btn-pill.idle{background:rgba(26,110,255,.25);border-color:rgba(26,110,255,.6)}
.mic-btn-pill.idle:hover{background:rgba(26,110,255,.4)}
.mic-btn-pill.listening{background:rgba(240,68,68,.35);border-color:var(--red);box-shadow:0 0 0 6px rgba(240,68,68,.15)}
.mic-btn-pill.translating{background:rgba(245,163,36,.3);border-color:var(--amb)}
.mic-btn-pill.done{background:rgba(22,201,106,.3);border-color:var(--grn)}
.mic-pill-icon{font-size:22px;line-height:1}
/* WATERMARK */
.watermark{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.12);white-space:nowrap;pointer-events:none;z-index:0;letter-spacing:.5px}
/* ADMIN extras */
.btn-danger{background:transparent;border:1px solid var(--red);border-radius:6px;padding:9px 18px;color:var(--red);font-family:var(--hb);font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.btn-danger:hover{background:rgba(240,68,68,.12)}
.btn-export-all{background:var(--grn);border:none;border-radius:6px;padding:12px 24px;color:#fff;font-family:var(--hb);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px}
.btn-export-all:hover{opacity:.88}
.btn-email{background:#0a7c4a;border:none;border-radius:6px;padding:12px 24px;color:#fff;font-family:var(--hb);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px}
.btn-email:hover{opacity:.88}
.hist-table{width:100%;border-collapse:collapse;font-size:13px}
.hist-table thead th{background:var(--card);border-bottom:2px solid var(--brd);padding:10px 12px;text-align:left;font-family:var(--hb);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx2);white-space:nowrap}
.hist-table tbody tr{border-bottom:1px solid var(--brd);cursor:pointer;transition:background .12s}
.hist-table tbody tr:hover td{background:rgba(26,110,255,.08)}
.hist-table td{padding:10px 12px;color:var(--tx);vertical-align:middle}
.hist-id{font-family:var(--hb);font-size:16px;font-weight:700;color:var(--blu)}
.hist-plates{font-family:monospace;font-size:13px}
.hist-voice{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--amb);vertical-align:middle;margin-left:4px;flex-shrink:0}
/* mic styles above */
/* LIGHT MODE ADMIN */
.admin-wrap.light{
  --bg:#f0f4f8;--surf:#ffffff;--card:#e8eef5;--brd:#c8d8e8;
  --tx:#0d1b2a;--tx2:#3a6080;--tx3:#7a9ab0;
  --blu:#1a6eff;--bld:#1452cc;--amb:#d4870a;--grn:#0ea05a;--red:#d93535;
}
.admin-wrap.light .watermark{color:rgba(0,0,0,.1)}
.admin-wrap.light .hist-table tbody tr:hover td{background:rgba(26,110,255,.06)}
.admin-wrap.light .search-input{color-scheme:light}
.admin-wrap.light .filter-date{color-scheme:light}
/* TOGGLE BTN */
.btn-theme{background:transparent;border:1px solid var(--brd);border-radius:20px;padding:5px 14px;color:var(--tx2);font-size:12px;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn-theme:hover{border-color:var(--blu);color:var(--tx)}
.admin-wrap{min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.admin-hdr{background:var(--surf);border-bottom:2px solid var(--brd);padding:12px 24px;display:flex;align-items:center;gap:16px}
.admin-hdr h1{font-family:var(--hb);font-size:17px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tx)}
.admin-hdr p{font-size:12px;color:var(--tx2);margin-top:2px}
.admin-tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--brd);flex-shrink:0}
.admin-tab{padding:12px 24px;background:transparent;border:none;border-bottom:3px solid transparent;color:var(--tx2);font-family:var(--hb);font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .15s}
.admin-tab.active{border-bottom-color:var(--blu);color:var(--tx)}
.admin-tab.detail-tab{border-bottom-color:var(--amb);color:var(--amb)}
.admin-body{flex:1;padding:24px;max-width:900px;margin:0 auto;width:100%}
.admin-sec-title{font-family:var(--hb);font-size:17px;font-weight:700;color:var(--tx2);letter-spacing:1px;text-transform:uppercase;margin-bottom:20px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.dfield{background:var(--card);border-left:4px solid var(--brd);border-radius:0 4px 4px 0;padding:11px 15px}
.dfield.big{border-left-color:var(--blu)}
.dfield.full{grid-column:1/-1}
.dfield-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.8px;color:var(--tx2);font-weight:700;margin-bottom:4px}
.dfield-val{font-size:15px;font-weight:600;color:var(--tx)}
.dfield.big .dfield-val{font-family:var(--hb);font-size:28px;font-weight:900;color:var(--blu);letter-spacing:3px}
.voice-box{background:rgba(245,163,36,.07);border:1px solid var(--amb);border-radius:8px;padding:14px 16px;margin-bottom:20px}
.voice-box-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--amb);font-weight:700;margin-bottom:6px}
.voice-box-txt{font-size:14px;color:var(--tx);line-height:1.55}
.btn-pdf{background:var(--blu);border:none;border-radius:6px;padding:12px 24px;color:#fff;font-family:var(--hb);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px}
.btn-pdf:hover{background:var(--bld)}
.search-input{width:100%;padding:12px 16px;background:var(--card);border:1px solid var(--brd);border-radius:6px;color:var(--tx);font-size:15px;outline:none;margin-bottom:16px;direction:ltr;text-align:left}
.search-input:focus{border-color:var(--blu)}
.search-input::placeholder{color:var(--tx3)}
.search-row{background:var(--card);border:1px solid var(--brd);border-radius:6px;padding:12px 16px;display:flex;align-items:center;gap:16px;margin-bottom:8px;cursor:pointer;width:100%;text-align:left;color:var(--tx)}
.search-row:hover{border-color:var(--blu)}
.search-row-id{font-family:var(--hb);font-size:18px;font-weight:700;color:var(--blu);min-width:110px}
.search-row-date{font-size:12px;color:var(--tx2);white-space:nowrap}
.search-row-op{font-size:13px;flex:1}
.search-row-plates{font-size:12px;font-family:monospace;color:var(--tx2);white-space:nowrap}
.empty{text-align:center;padding:56px 20px;color:var(--tx3);font-size:15px}
.detail-back-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.btn-sm-back{background:var(--card);border:1px solid var(--brd);border-radius:4px;padding:7px 14px;color:var(--tx2);font-size:12px}
.btn-sm-back:hover{border-color:var(--tx2)}
@media(max-width:520px){.detail-grid{grid-template-columns:1fr}.dfield.full{grid-column:auto}.lang-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}}
/* PIN */
.pin-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:24px;padding:20px}
.pin-box{background:var(--surf);border:2px solid var(--brd);border-radius:16px;padding:32px 40px;text-align:center;width:100%;max-width:340px}
.pin-title{font-family:var(--hb);font-size:22px;font-weight:700;color:var(--tx);margin-bottom:6px;letter-spacing:1px}
.pin-sub{font-size:13px;color:var(--tx2);margin-bottom:24px}
.pin-display{font-family:monospace;font-size:40px;letter-spacing:12px;color:var(--tx);background:var(--card);border:2px solid var(--brd);border-radius:8px;padding:12px 20px;margin-bottom:20px;min-height:68px;display:flex;align-items:center;justify-content:center}
.pin-display.err{border-color:var(--red);color:var(--red)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-btn{background:var(--card);border:2px solid var(--brd);border-radius:10px;padding:18px;font-family:var(--hb);font-size:26px;font-weight:700;color:var(--tx)}
.pin-btn:hover{border-color:var(--blu);background:#16305a}
.pin-btn.del{font-size:20px;color:var(--tx2)}
.pin-btn.zero{grid-column:2}
/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:14px 16px;text-align:center}
.stat-card.blu{border-color:rgba(26,110,255,.4)}
.stat-card.grn{border-color:rgba(22,201,106,.4)}
.stat-card.amb{border-color:rgba(245,163,36,.4)}
.stat-num{font-family:var(--hb);font-size:34px;font-weight:900;line-height:1}
.stat-card.blu .stat-num{color:var(--blu)}
.stat-card.grn .stat-num{color:var(--grn)}
.stat-card.amb .stat-num{color:var(--amb)}
.stat-card .stat-num{color:var(--tx)}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--tx2);margin-top:5px;font-weight:700}
/* FILTERS */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-sel{background:var(--card);border:1px solid var(--brd);border-radius:6px;padding:7px 10px;color:var(--tx);font-size:12px;outline:none}
.filter-sel:focus{border-color:var(--blu)}
.filter-date{background:var(--card);border:1px solid var(--brd);border-radius:6px;padding:7px 10px;color:var(--tx);font-size:12px;outline:none;color-scheme:dark}
.btn-filter-clear{background:transparent;border:1px solid var(--brd);border-radius:6px;padding:7px 12px;color:var(--tx2);font-size:11px}
/* COUNTDOWN */
.countdown-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:8px}
.countdown-svg{transform:rotate(-90deg);display:block}
.countdown-track{fill:none;stroke:var(--brd);stroke-width:5}
.countdown-prog{fill:none;stroke:var(--blu);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.countdown-label{font-size:12px;color:var(--tx2);margin-top:6px;font-family:var(--hb);letter-spacing:.5px}
/* TICKET */
.btn-ticket{background:rgba(22,201,106,.15);border:1px solid var(--grn);border-radius:6px;padding:10px 20px;color:var(--grn);font-family:var(--hb);font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px;margin-top:4px}
.btn-ticket:hover{background:rgba(22,201,106,.25)}
.admin-actions-row{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
</style>
</head>

function getStats(){
  const todayStr=new Date().toISOString().slice(0,10);
  const weekAgo=new Date(Date.now()-7*86400000);
  const today=S.regs.filter(r=>r.timestamp.slice(0,10)===todayStr).length;
  const week=S.regs.filter(r=>new Date(r.timestamp)>=weekAgo).length;
  const byOp={};S.regs.forEach(r=>{byOp[r.operationLabel]=(byOp[r.operationLabel]||0)+1;});
  const topOp=Object.entries(byOp).sort((a,b)=>b[1]-a[1])[0];
  return {total:S.regs.length,today,week,topOp:topOp?topOp[0]:'—',topOpN:topOp?topOp[1]:0};
}

/* ── VOICE ── */
let recog=null;
async function translateToSpanish(text, sourceLang){
  try{
    const sl=sourceLang||S.lang;
    const langMap={es:'es',en:'en',fr:'fr',tr:'tr',ru:'ru',it:'it',pt:'pt',cs:'cs',bg:'bg',pl:'pl',ro:'ro',de:'de',el:'el',nl:'nl',ar:'ar',lt:'lt',lv:'lv',sk:'sk',sl:'sl',da:'da'};
    const slCode=langMap[sl]||sl;
    if(slCode==='es') return text;
    const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${slCode}|es`;
    const r=await fetch(url);
    const d=await r.json();
    if(d.responseStatus===200&&d.responseData?.translatedText){return d.responseData.translatedText;}
    return text;
  }catch(e){return text;}
}
function handleVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){S.voiceError='⚠ Voz no soportada en este navegador';updateMicUI();return;}
  if(S.voiceState==='listening'){recog&&recog.stop();return;}
  recog=new SR();
  recog.lang=RECOG[S.lang]||'es-ES';
  recog.continuous=false;recog.interimResults=false;
  recog.onstart=()=>{S.voiceState='listening';S.voiceError='';updateMicUI();};
  recog.onerror=(ev)=>{
    S.voiceState='idle';
    if(ev.error==='not-allowed') S.voiceError='⚠ Permiso de micrófono denegado';
    else if(ev.error==='network') S.voiceError='⚠ La voz requiere conexión HTTPS (use Netlify)';
    else if(ev.error==='no-speech') S.voiceError='';
    else S.voiceError='';
    updateMicUI();
  };
  recog.onend=()=>{
    if(S.voiceState==='listening'){S.voiceState='idle';updateMicUI();}
  };
  recog.onresult=async(e)=>{
    S.voiceError='';
    const transcript=Array.from(e.results).map(r=>r[0].transcript).join(' ');
    S.voiceState='translating';updateMicUI();
    const translated=await translateToSpanish(transcript,S.lang);
    S.pendingVoice=S.pendingVoice?S.pendingVoice+' | '+translated:translated;
    if(S.regs.length>0){
      const last=S.regs[S.regs.length-1];
      last.voiceText=last.voiceText?last.voiceText+' | '+translated:translated;
      updateVoiceInCloud(last.id,last.voiceText);
    }
    S.voiceState='done';updateMicUI();
    setTimeout(()=>{S.voiceState='idle';updateMicUI();},2500);
  };
  recog.start();
}

function updateMicUI(){
  const t=tt();const vs=S.voiceState;
  const icons={idle:'🎤',listening:'⏹',translating:'⏳',done:'✅'};
  const labels={idle:t.voiceHint,listening:t.listening,translating:t.translating,done:t.voiceDone};
  const btn=document.getElementById('micPill');
  if(btn){
    btn.className='mic-btn-pill '+vs;
    btn.innerHTML=`<span class="mic-pill-icon">${icons[vs]||'🎤'}</span><span>${labels[vs]||t.voiceHint}</span>`;
  }
  const errEl=document.getElementById('voiceError');
  if(errEl) errEl.textContent=S.voiceError||'';
  const vbox=document.getElementById('voiceCaptured');
  if(vbox){
    if(S.pendingVoice){
      vbox.style.display='block';
      vbox.querySelector('.vc-txt').textContent=S.pendingVoice;
    } else {
      vbox.style.display='none';
    }
  }
}

// Anti-pausa Supabase: ping cada 4 días
(async function keepAlive(){
  try{
    const last=parseInt(localStorage.getItem('arrivia_ping')||'0');
    const now=Date.now();
    if(now-last > 4*24*60*60*1000){
      await fetch(SB_URL+'/rest/v1/Registros?select=reg_id&limit=1',{headers:SB_HDR});
      localStorage.setItem('arrivia_ping',String(now));
    }
  }catch(e){}
})();

function submitVehicle(){
  const v=S.veh;const e={};
  if(!v.tractor.trim())e.tractor=true;
  if(Object.keys(e).length){S.errors=e;render();return;}
  const id=nextId();
  const ctry=S.country?COUNTRIES.find(c=>c.id===S.country):null;
  const newReg={id,timestamp:new Date().toISOString(),operation:S.op,operationLabel:OP_ES[S.op],countryType:OP_CTRY[S.op],country:ctry?ctry.es:null,tractor:v.tractor.trim().toUpperCase(),trailer:v.trailer.trim().toUpperCase(),reference:v.reference.trim(),notes:v.notes.trim(),voiceText:S.pendingVoice};
  S.regs.push(newReg);
  saveRegs();
  saveRegToCloud(newReg);
  S.screen='confirmation';render();
}

/* ── EMAIL ── */
function sendEmail(regId){
  const reg=S.regs.find(r=>r.id===regId);
  if(!reg)return;
  const to='tmh_moldtrans@moldtrans.com';
  const subject=encodeURIComponent('ARRIVIA · Registro '+reg.id+' · '+reg.tractor);
  const nl='%0D%0A';
  const sep=encodeURIComponent('--------------------------------------------------');
  let b='ARRIVIA+–+Registro+de+llegada+de+camión'+nl+sep+nl;
  b+='Nº+Registro:++++++++++'+encodeURIComponent(reg.id)+nl;
  b+='Fecha+y+hora:+++++++++'+encodeURIComponent(fmtDate(reg.timestamp))+nl;
  b+='Operación:++++++++++++'+encodeURIComponent(reg.operationLabel)+nl;
  b+='País+de+'+encodeURIComponent(reg.countryType||'—')+':+++'+encodeURIComponent(reg.country||'—')+nl;
  b+=sep+nl;
  b+='Matrícula+tractora:+++'+encodeURIComponent(reg.tractor)+nl;
  b+='Matrícula+remolque:+++'+encodeURIComponent(reg.trailer||'—')+nl;
  b+='Ref./Expedición:++++++'+encodeURIComponent(reg.reference||'—')+nl;
  if(reg.notes)b+='Observaciones:++++++++'+encodeURIComponent(reg.notes)+nl;
  b+=sep+nl;
  if(reg.voiceText)b+='Mensaje+de+voz+(ES):++'+encodeURIComponent(reg.voiceText)+nl+sep+nl;
  b+='Enviado+desde+ARRIVIA+·+Proyecto+y+diseño:+Eduardo+Perez+Gamarro';
  window.location.href='mailto:'+to+'?subject='+subject+'&body='+b;
}

  w.document.write('<div class="hd"><h1>Registro de Llegada de Camión</h1><p>Sistema de control de acceso · Documento generado automáticamente</p></div>');
  w.document.write('<div class="rn">'+reg.id+'</div>');
  w.document.write('<div class="grid">');
  w.document.write('<div class="f full"><div class="lb">Fecha y hora de registro</div><div class="vl">'+fmtDate(reg.timestamp)+'</div></div>');
  w.document.write('<div class="f"><div class="lb">Operación</div><div class="vl">'+reg.operationLabel+'</div></div>');
  w.document.write('<div class="f"><div class="lb">País de '+(reg.countryType||'—')+'</div><div class="vl">'+(reg.country||'—')+'</div></div>');
  w.document.write('<div class="f"><div class="lb">Matrícula tractora</div><div class="vl">'+reg.tractor+'</div></div>');
  w.document.write('<div class="f"><div class="lb">Matrícula remolque</div><div class="vl">'+reg.trailer+'</div></div>');
  w.document.write('<div class="f full"><div class="lb">Referencia / Expedición</div><div class="vl">'+(reg.reference||'—')+'</div></div>');
  if(reg.notes)w.document.write('<div class="f full"><div class="lb">Observaciones</div><div class="vl">'+reg.notes+'</div></div>');
  w.document.write('</div>');
  if(reg.voiceText)w.document.write('<div class="vb"><div class="lb">Mensaje de voz (traducido al español)</div><div class="vl">'+reg.voiceText+'</div></div>');
  w.document.write('</body></html>');
  w.document.close();
  setTimeout(()=>{w.focus();w.print();},400);

/* ── MIC HTML ── */
function micHtml(){
  const t=tt();const vs=S.voiceState;
  const icons={idle:'🎤',listening:'⏹',translating:'⏳',done:'✅'};
  const labels={idle:t.voiceHint,listening:t.listening,translating:t.translating,done:t.voiceDone};
  const isRTL=t.dir==='rtl';
  const capturedBox=S.pendingVoice
    ?`<div id="voiceCaptured" style="background:rgba(245,163,36,.1);border:1px solid var(--amb);border-radius:8px;padding:10px 14px;margin-top:10px;max-width:560px;width:100%"><div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--amb);font-weight:700;margin-bottom:4px">🎤 Mensaje capturado (ES)</div><div class="vc-txt" style="font-size:13px;color:var(--tx);line-height:1.5">${esc(S.pendingVoice)}</div></div>`
    :`<div id="voiceCaptured" style="display:none"><div class="vc-txt"></div></div>`;
  const errorBox=`<p id="voiceError" style="color:var(--amb);font-size:12px;margin-top:6px;text-align:center;min-height:18px">${S.voiceError||''}</p>`;
  return `<div class="mic-wrap${isRTL?' rtl':''}"><button id="micPill" class="mic-btn-pill ${vs}" onclick="handleVoice()"><span class="mic-pill-icon">${icons[vs]||'🎤'}</span><span>${esc(labels[vs]||t.voiceHint)}</span></button>${errorBox}${capturedBox}</div>`;
}

/* ── REG DETAIL HTML ── */
function regDetailHtml(reg){
  const fields=[
    {lb:'Nº de registro',vl:reg.id,big:true,full:false},
    {lb:'Fecha y hora de registro',vl:fmtDate(reg.timestamp),big:false,full:false},
    {lb:'Operación',vl:reg.operationLabel,big:false,full:false},
    {lb:'País de '+(reg.countryType||'—'),vl:reg.country||'—',big:false,full:false},
    {lb:'Matrícula tractora',vl:reg.tractor,big:false,full:false},
    {lb:'Matrícula remolque',vl:reg.trailer,big:false,full:false},
    {lb:'Referencia / Expedición',vl:reg.reference||'—',big:false,full:true},
    ...(reg.notes?[{lb:'Observaciones',vl:reg.notes,big:false,full:true}]:[]),
  ];
  const grid=fields.map(f=>`<div class="dfield${f.big?' big':''}${f.full?' full':''}"><div class="dfield-lbl">${esc(f.lb)}</div><div class="dfield-val">${esc(f.vl)}</div></div>`).join('');
  const voice=reg.voiceText?`<div class="voice-box"><div class="voice-box-lbl">Mensaje de voz (traducido al español)</div><div class="voice-box-txt">${esc(reg.voiceText)}</div></div>`:'';
  return `<div class="detail-grid">${grid}</div>${voice}<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center"><button class="btn-pdf" onclick="printPDF('${esc(reg.id)}')">📄 EXPORTAR PDF</button><button class="btn-email" onclick="sendEmail('${esc(reg.id)}')">✉️ ENVIAR CORREO</button><button class="btn-ticket" onclick="printTicket('${esc(reg.id)}')">🎫 IMPRIMIR TICKET</button><button class="btn-danger" onclick="deleteReg('${esc(reg.id)}')">🗑 ELIMINAR</button></div>`;
}

/* ── RENDER ── */
function render(){
  const app=document.getElementById('app');
  if(!app)return;
  const t=tt();
  const dir=t.dir;

  /* ── PIN SCREEN ── */
  if(S.mode==='pin'){
    const dots=S.pinError?'<span style="color:var(--red);font-size:28px;letter-spacing:8px">✗ ✗ ✗ ✗</span>':('<span style="letter-spacing:14px;font-size:32px">'+'●'.repeat(S.pinInput.length)+'<span style="opacity:.25">'+'●'.repeat(4-S.pinInput.length)+'</span></span>');
    const nums=[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-btn" onclick="pinPress(${n})">${n}</button>`).join('');
    app.innerHTML=`<div class="pin-wrap"><div class="pin-box"><div class="pin-title">🔒 ADMINISTRACIÓN</div><div class="pin-sub">Introduce el PIN de acceso</div><div class="pin-display${S.pinError?' err':''}">${dots}</div><div class="pin-grid">${nums}<button class="pin-btn del" onclick="pinDel()">⌫</button><button class="pin-btn zero" onclick="pinPress(0)">0</button></div></div><button class="btn-ghost" onclick="goKiosk()" style="margin-top:8px">← Volver al kiosco</button></div>`;
    // Attach search listener after render - only if search tab is active
    if(S.adminTab==='search'&&!S.detailReg){
      setTimeout(function(){
        var inp=document.getElementById('searchInput');
        if(inp&&!inp._listenerAdded){
          inp._listenerAdded=true;
          inp.addEventListener('input',function(){
            S.searchQ=this.value;
            var v=this.value;
            var sres=v.trim()?S.regs.filter(function(r){return r.id.toLowerCase().includes(v.toLowerCase())||r.tractor.toLowerCase().includes(v.toLowerCase())||(r.trailer||'').toLowerCase().includes(v.toLowerCase());}):[];
            var noRes=v.trim()&&sres.length===0?'<p style="color:var(--tx2);font-size:14px">Sin resultados.</p>':'';
            var rows=sres.map(function(r){return '<button class="search-row" onclick="setDetail(S.regs.find(function(x){return x.id===\''+r.id+'\';}))">'+'<span class="search-row-id">'+r.id+'</span>'+'</button>';}).join('');
            var el=document.getElementById('searchResults');
            if(el) el.innerHTML=noRes+rows;
          });
          inp.setAttribute('dir','ltr');
          inp.style.direction='ltr';
          inp.style.textAlign='left';
          inp.style.unicodeBidi='bidi-override';
          inp.addEventListener('focus',function(){
            var len=this.value.length;
            this.setSelectionRange(len,len);
          });
        }
      },50);
    }
    return;
  }
  if(S.mode==='admin'){
    document.body.dir='ltr';document.documentElement.dir='ltr';
    const lastReg=S.regs.length?S.regs[S.regs.length-1]:null;
    const sres=S.searchQ.trim()?S.regs.filter(r=>r.id.toLowerCase().includes(S.searchQ.toLowerCase())||r.tractor.toLowerCase().includes(S.searchQ.toLowerCase())||(r.trailer||'').toLowerCase().includes(S.searchQ.toLowerCase())):[];
    let body='';
    if(S.detailReg){
      body=`<div class="detail-back-row"><button class="btn-sm-back" onclick="clearDetail()">← Volver</button><span class="admin-sec-title" style="margin:0">DETALLE: ${esc(S.detailReg.id)}</span></div>${regDetailHtml(S.detailReg)}`;

      const statsHtml=`<div class="stats-row"><div class="stat-card blu"><div class="stat-num">${st.total}</div><div class="stat-lbl">Total registros</div></div><div class="stat-card grn"><div class="stat-num">${st.today}</div><div class="stat-lbl">Hoy</div></div><div class="stat-card amb"><div class="stat-num">${st.week}</div><div class="stat-lbl">Últimos 7 días</div></div><div class="stat-card"><div class="stat-num" style="font-size:13px;line-height:1.3;padding-top:4px;color:var(--tx)">${esc(st.topOp)}</div><div class="stat-lbl">Top operación (${st.topOpN})</div></div></div>`;

      const allRows=filtered.map(r=>`<tr onclick="setDetail(S.regs.find(x=>x.id==='${esc(r.id)}'))"><td class="hist-id">${esc(r.id)}</td><td>${esc(fmtDate(r.timestamp))}</td><td>${esc(r.operationLabel)}</td><td>${esc(r.country||'—')}</td><td class="hist-plates">${esc(r.tractor)}</td><td class="hist-plates">${esc(r.trailer||'—')}</td><td>${esc(r.reference||'—')}</td><td>${r.voiceText?'<span class="hist-voice" title="Incluye mensaje de voz"></span>':''}</td></tr>`).join('');

    } else {
      const rows=sres.map(r=>`<button class="search-row" onclick="setDetail(S.regs.find(x=>x.id==='${esc(r.id)}'))"><span class="search-row-id">${esc(r.id)}</span><span class="search-row-date">${esc(fmtDate(r.timestamp))}</span><span class="search-row-op">${esc(r.operationLabel)}</span><span class="search-row-plates">${esc(r.tractor)} / ${esc(r.trailer||'—')}</span></button>`).join('');
      const noRes=S.searchQ.trim()&&sres.length===0?'<p style="color:var(--tx2);font-size:14px">Sin resultados.</p>':'';
      body=`<div class="admin-sec-title">BÚSQUEDA DE REGISTROS</div><div dir="ltr" lang="es" style="direction:ltr;unicode-bidi:isolate"><input id="searchInput" class="search-input" dir="ltr" lang="es" style="direction:ltr!important;text-align:left!important;unicode-bidi:bidi-override!important" placeholder="Buscar por matrícula o número de registro..." value="${esc(S.searchQ)}"></div><div id="searchResults">${noRes}${rows}</div>`;
    }
    app.innerHTML=`<div class="admin-wrap${S.adminLight?' light':''}"><div class="admin-hdr"><span style="font-size:28px">🚛</span><div><h1>ARRIVIA — Administración</h1><p>Panel de gestión · ${S.regs.length} registro(s) almacenado(s)</p></div><div style="margin-left:auto;display:flex;align-items:center;gap:10px"><button class="btn-theme" onclick="changePin()">🔑 Cambiar PIN</button><button class="btn-theme" onclick="toggleLight()">${S.adminLight?'🌙 Modo oscuro':'☀️ Modo claro'}</button><button class="btn-sm-back" onclick="goKiosk()">🔒 Cerrar sesión</button></div></div><div class="admin-tabs"><button class="admin-tab${S.adminTab==='last'&&!S.detailReg?' active':''}" onclick="setAdminTab('last')">📊 RESUMEN</button><button class="admin-tab${S.adminTab==='history'&&!S.detailReg?' active':''}" onclick="setAdminTab('history')">🗂 HISTORIAL</button><button class="admin-tab${S.adminTab==='search'&&!S.detailReg?' active':''}" onclick="setAdminTab('search')">🔍 BÚSQUEDA</button>${S.detailReg?`<button class="admin-tab detail-tab">📄 DETALLE: ${esc(S.detailReg.id)}</button>`:''}</div><div class="admin-body">${body}</div></div>`;
    // Attach search input handler after render
    if(S.adminTab==='search'&&!S.detailReg){
      setTimeout(()=>{
        const inp=document.getElementById('searchInput');
        if(inp){
          inp.addEventListener('input',(e)=>{S.searchQ=e.target.value;render();});
          inp.focus();
        }
      },0);
    }
    return;
  }

  /* ── KIOSK ── */
  let content='';

  if(S.screen==='language'){
    const btns=LANG_ORDER.map(lk=>`<button class="btn-lang" onclick="goLang('${lk}')"><img src="${FLAG_BASE}${FLAG_CC[lk]}.svg" alt="${T[lk].name}" width="54" height="40" style="border-radius:5px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,.55);display:block;flex-shrink:0"><span class="lname">${esc(T[lk].name)}</span></button>`).join('');
    content=`<p style="text-align:center;color:var(--tx);margin-bottom:22px;font-size:20px;font-family:var(--hb);letter-spacing:1px;font-weight:600">Select your language &nbsp;·&nbsp; Selecciona tu idioma</p><div class="lang-grid">${btns}</div><div style="text-align:center;margin-top:20px"><button class="btn-ghost" onclick="goAdmin()">⚙ Administración</button></div>`;
    app.innerHTML=`<div class="kiosk-wrap"><div class="kiosk-hdr"><span class="kiosk-hdr-icon">🚛</span><span class="kiosk-hdr-title">ARRIVIA</span></div><div class="kiosk-body">${content}</div></div>`;
    return;
  }

  if(S.screen==='operation'){
    const btns=OP_ORDER.map(opKey=>`<button class="btn-op" onclick="goOp('${opKey}')"><span class="icon">${OP_ICONS[opKey]}</span><span>${esc(t.ops[opKey])}</span></button>`).join('');
    content=`<div class="op-list">${btns}<div style="text-align:center;margin-top:8px"><button class="btn-back" onclick="goBack()">← ${esc(t.back)}</button></div></div>`;
  }

  if(S.screen==='country'){
    const prompt=OP_CTRY[S.op]==='origen'?t.originPr:t.destPr;
    const btns=COUNTRIES.map(c=>`<button class="btn-country" onclick="goCountry('${c.id}')">${esc(c[S.lang]||c.es)}</button>`).join('');
    content=`<div class="country-grid">${btns}</div><div style="text-align:center;margin-top:20px"><button class="btn-back" onclick="goBack()">← ${esc(t.back)}</button></div>`;
    app.innerHTML=`<div class="kiosk-wrap" dir="${dir}"><div class="kiosk-hdr"><span class="kiosk-hdr-icon">🚛</span><span class="kiosk-hdr-title">ARRIVIA</span></div><div class="kiosk-body"><div class="screen-title">${esc(prompt)}</div>${content}</div></div>`;
    return;
  }

  if(S.screen==='vehicle'){
    const fields=[
      {k:'tractor',lbl:t.tractor,req:true,multi:false},
      {k:'trailer',lbl:t.trailer,req:false,multi:false},
      {k:'reference',lbl:t.reference,req:false,multi:false},
      {k:'notes',lbl:t.notes,req:false,multi:true},
    ];
    const fHtml=fields.map(f=>{
      const hasErr=S.errors[f.k];
      const inp=f.multi
        ?`<textarea class="field-input${hasErr?' err':''}" rows="3" onchange="setField('${f.k}',this.value)" oninput="setField('${f.k}',this.value)">${esc(S.veh[f.k])}</textarea>`
        :`<input type="text" class="field-input${hasErr?' err':''}" value="${esc(S.veh[f.k])}" onchange="setField('${f.k}',this.value.toUpperCase());this.value=this.value.toUpperCase()" oninput="setField('${f.k}',this.value.toUpperCase());this.value=this.value.toUpperCase()">`;
      return `<div class="form-group"><label class="field-label${hasErr?' err':''}">${esc(f.lbl)}${f.req?'<span style="color:var(--red)"> *</span>':''}</label>${inp}${hasErr?`<span class="field-err">${esc(t.required)}</span>`:''}</div>`;
    }).join('');
    content=`<div class="form-wrap">${fHtml}<div class="form-actions"><button class="btn-back" onclick="goBack()">← ${esc(t.back)}</button><button class="btn-primary" onclick="submitVehicle()">${esc(t.confirm)}</button></div></div>${micHtml()}`;
  }

  if(S.screen==='confirmation'){
    const lastReg=S.regs.length?S.regs[S.regs.length-1]:null;
    const circ=2*Math.PI*28;
    const countdownHtml=`<div class="countdown-wrap"><svg width="64" height="64" class="countdown-svg" viewBox="0 0 64 64"><circle class="countdown-track" cx="32" cy="32" r="28"/><circle id="cdProg" class="countdown-prog" cx="32" cy="32" r="28" stroke-dasharray="${circ}" stroke-dashoffset="0"/></svg><div id="cdLabel" class="countdown-label">Auto-reset en 30s</div></div>`;
    content=`<div class="confirm-center"><div class="confirm-bigicon">✅</div><h2 class="confirm-title">${esc(t.regOk)}</h2><p class="confirm-msg">${esc(t.regMsg)}</p>${lastReg?`<div class="confirm-id-box"><p class="confirm-id-lbl">${esc(t.regNum)}</p><p class="confirm-id-val">${esc(lastReg.id)}</p></div>`:''}<button class="btn-newreg" onclick="resetKiosk()">${esc(t.newReg)}</button><div style="margin-top:24px">${countdownHtml}</div></div>`;
  }

  const title=S.screen==='operation'?t.selectOp:S.screen==='vehicle'?t.vehicleTitle:'';
  app.innerHTML=`<div class="kiosk-wrap" dir="${dir}"><div class="kiosk-hdr"><span class="kiosk-hdr-icon">🚛</span><span class="kiosk-hdr-title">ARRIVIA</span></div><div class="kiosk-body">${title?`<div class="screen-title">${esc(title)}</div>`:''}${content}</div></div>`;
  if(S.screen==='confirmation') startCountdown();
}

render();
</script>
</body>
</html>
