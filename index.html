<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ARRIVIA - Registro de Camiones</title>
<style>
:root {
  --bg: #0f1419;
  --surf: #1a202c;
  --card: #1f2937;
  --brd: #374151;
  --tx: #f3f4f6;
  --tx2: #d1d5db;
  --tx3: #9ca3af;
  --blu: #3b82f6;
  --red: #ef4444;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--tx); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.kiosk-wrap, .admin-wrap, .pin-wrap { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
.btn-ghost { background: transparent; border: 1px solid var(--brd); padding: 10px 16px; border-radius: 6px; color: var(--tx); cursor: pointer; }
.btn-ghost:hover { border-color: var(--blu); }
</style>
</head>
<body>
<div id="app"></div>
<script>
const IS_ADMIN_URL = new URLSearchParams(window.location.search).has('admin');

let S = {
  mode: IS_ADMIN_URL ? 'admin' : 'kiosk',
  lang: 'es',
  adminAuth: IS_ADMIN_URL
};

function render() {
  const app = document.getElementById('app');
  
  if (S.mode === 'kiosk') {
    app.innerHTML = `
      <div class="kiosk-wrap">
        <h1>🚛 ARRIVIA</h1>
        <p>Selecciona idioma</p>
        <button class="btn-ghost" onclick="goAdmin()">⚙ Administración</button>
      </div>
    `;
  } else if (S.mode === 'admin') {
    app.innerHTML = `
      <div class="admin-wrap">
        <h1>🚛 ARRIVIA - Administración</h1>
        <p>Panel de control</p>
        <button class="btn-ghost" onclick="goKiosk()">← Volver</button>
      </div>
    `;
  }
}

function goAdmin() {
  S.mode = 'admin';
  render();
}

function goKiosk() {
  S.mode = 'kiosk';
  render();
}

render();
</script>
</body>
</html>
